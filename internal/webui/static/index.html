<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kalita</title>
<style>
  :root{--bg:#0f1419;--panel:#171d24;--line:#2a323c;--fg:#dbe2ea;--dim:#8a96a3;--acc:#4da3ff;--ok:#3fb96f;--warn:#e0a93f;--bad:#e0604f;}
  *{box-sizing:border-box} body{margin:0;font:14px/1.45 system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--fg)}
  a{color:var(--acc);text-decoration:none;cursor:pointer}
  .shell{display:flex;min-height:100vh}
  .side{width:220px;background:var(--panel);border-right:1px solid var(--line);padding:14px;flex-shrink:0}
  .side h1{font-size:16px;margin:0 0 4px} .side .who{color:var(--dim);font-size:12px;margin-bottom:14px}
  .nav a{display:block;padding:7px 10px;border-radius:6px;color:var(--fg)} .nav a.on,.nav a:hover{background:#1f2630}
  .nav .badge{float:right;background:var(--acc);color:#06121f;border-radius:9px;padding:0 7px;font-size:11px;font-weight:600}
  .main{flex:1;padding:20px 26px;max-width:1100px}
  h2{font-size:17px;margin:0 0 14px} h3{font-size:14px;color:var(--dim);margin:18px 0 8px}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);font-size:13px} th{color:var(--dim);font-weight:500}
  tr:hover td{background:#1c232c;cursor:pointer}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px}
  .btn{display:inline-block;background:#223041;color:var(--fg);border:1px solid var(--line);border-radius:6px;padding:6px 12px;cursor:pointer;font-size:13px;margin-right:6px}
  .btn:hover{border-color:var(--acc)} .btn.green{background:#15301f;border-color:var(--ok)} .btn.red{background:#33201c;border-color:var(--bad)}
  input,select,textarea{width:100%;background:#0d1217;color:var(--fg);border:1px solid var(--line);border-radius:6px;padding:7px 9px;font-size:13px;margin:3px 0 10px}
  label{font-size:12px;color:var(--dim)}
  .pill{display:inline-block;padding:1px 8px;border-radius:9px;font-size:11px;background:#223041}
  .err{color:var(--bad);font-size:13px;margin:8px 0}
  .cols{display:flex;gap:12px;overflow-x:auto} .col{min-width:200px;flex:1}
  .col h4{font-size:12px;color:var(--dim);margin:0 0 8px;text-transform:uppercase}
  .kcard{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:9px 11px;margin-bottom:8px;cursor:pointer}
  .kcard:hover{border-color:var(--acc)}
  .login{max-width:340px;margin:14vh auto}
  .muted{color:var(--dim);font-size:12px}
  .tabs a{margin-right:14px;color:var(--dim)} .tabs a.on{color:var(--fg);border-bottom:2px solid var(--acc)}
  pre{background:#0d1217;border:1px solid var(--line);border-radius:6px;padding:8px;font-size:12px;overflow-x:auto}
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/app.js"></script>
</body>
</html>
