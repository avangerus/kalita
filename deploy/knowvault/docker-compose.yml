# KnowVault — the whole product in one command: docker compose up
# A company runs this and gets perimeter document search. They never type the
# word "kalita": node + postgres + qdrant + indexer + search, wired together,
# workers self-register via the shared bootstrap secret.
#
# Set these in a .env file next to this compose (see .env.example):
#   POSTGRES_PASSWORD, KALITA_BOOTSTRAP_SECRET, KV_LM (embeddings + chat endpoint)

name: knowvault

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knowvault}
      POSTGRES_DB: knowvault
    volumes: [journal:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    volumes: [vectors:/qdrant/storage]

  node:
    build: { context: ../.., dockerfile: Dockerfile }
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      KALITA_PG_DSN: postgres://postgres:${POSTGRES_PASSWORD:-knowvault}@postgres:5432/knowvault
      KALITA_BOOTSTRAP_SECRET: ${KALITA_BOOTSTRAP_SECRET:?set a strong secret in .env}
    command:
      - serve
      - --pack=/opt/kalita/packs/knowvault
      - --listen=:8080
      - --insecure-http            # TLS terminates at your reverse proxy
      - --ui-dir=/opt/kalita/web
      - --files-dir=/data/files
      - --data-dir=/data/keys
      - --search-backend=http://search:8200
    volumes: [files:/data/files, keys:/data/keys]
    ports: ["8080:8080"]

  indexer:
    build: { context: ../../workers, dockerfile: Dockerfile }
    depends_on: [node, qdrant]
    command: ["knowvault_indexer/indexer.py"]
    environment:
      KALITA_URL: http://node:8080
      KALITA_BOOTSTRAP_SECRET: ${KALITA_BOOTSTRAP_SECRET}
      KALITA_WORKER_ID: indexer-1
      KALITA_WORKER_ROLE: Indexer
      KALITA_WORKER_MODEL: ${KV_EMBED_MODEL:-text-embedding-nomic-embed-text-v1.5}
      KV_QDRANT: http://qdrant:6333
      KV_LM: ${KV_LM:?set the LM endpoint (embeddings) in .env}

  search:
    build: { context: ../../workers, dockerfile: Dockerfile }
    depends_on: [qdrant]
    command: ["knowvault_search/service.py"]
    environment:
      KV_LISTEN: 0.0.0.0:8200
      KV_QDRANT: http://qdrant:6333
      KV_LM: ${KV_LM:?set the LM endpoint (chat) in .env}
      KV_CHAT_MODEL: ${KV_CHAT_MODEL:-openai/gpt-oss-20b}

volumes:
  journal:
  vectors:
  files:
  keys:
